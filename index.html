<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2D & 3D Shapes & Planets Challenge</title>
    <style>
        :root {
            --primary: #4a00e0;
            --secondary: #8e2de2;
            --success: #00b09b;
            --danger: #ff416c;
            --space-bg: #050510;
            --bg: #f0f2f5;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px;
            color: #333;
        }

        .game-container {
            background: white;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 500px;
            text-align: center;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .level-badge {
            background: var(--secondary);
            color: white;
            padding: 6px 14px;
            border-radius: 50px;
            font-weight: bold;
            font-size: clamp(0.9rem, 3vw, 1.1rem);
        }

        .score-badge {
            font-weight: bold;
            color: #666;
            font-size: clamp(0.9rem, 3vw, 1.1rem);
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #eee;
            border-radius: 5px;
            overflow: hidden;
            margin-bottom: 20px;
        }

        .progress {
            height: 100%;
            background: linear-gradient(90deg, var(--success), #96c93d);
            width: 2%;
            transition: width 0.3s ease;
        }

        .question {
            font-size: clamp(1.1rem, 4vw, 1.4rem);
            font-weight: 600;
            margin-bottom: 20px;
            color: #222;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .display-area {
            height: clamp(160px, 28vh, 240px);
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
            background: #fafafa;
            border-radius: 15px;
            border: 2px dashed #ddd;
            position: relative;
            overflow: hidden;
            transition: background 0.4s ease;
        }

        /* Dark outer space background style with soft star field */
        .display-area.space-mode {
            background: var(--space-bg);
            background-image: 
                radial-gradient(white, rgba(255,255,255,.2) 2px, transparent 40px),
                radial-gradient(white, rgba(255,255,255,.15) 1px, transparent 30px);
            background-size: 120px 120px, 90px 90px;
            background-position: 0 0, 40px 60px;
            border-color: #1e293b;
        }

        .shape {
            transition: transform 0.3s ease;
            max-width: 100%;
            max-height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .shape svg {
            width: clamp(110px, 24vw, 150px);
            height: clamp(110px, 24vw, 150px);
        }

        /* 3D Isometric Projection Setup */
        .scene3d {
            width: clamp(80px, 18vw, 110px);
            height: clamp(80px, 18vw, 110px);
            transform-style: preserve-3d;
            animation: spin 8s infinite linear;
        }

        @keyframes spin {
            0% { transform: rotateX(-20deg) rotateY(0deg); }
            100% { transform: rotateX(-20deg) rotateY(360deg); }
        }

        .cube {
            position: relative;
            width: 100%;
            height: 100%;
            transform-style: preserve-3d;
        }
        
        .cube-face {
            position: absolute;
            width: 100%;
            height: 100%;
            background: rgba(142, 45, 226, 0.7);
            border: 2px solid #fff;
        }
        
        .face-front  { transform: rotateY(  0deg) translateZ(calc(clamp(80px, 18vw, 110px) / 2)); }
        .face-back   { transform: rotateY(180deg) translateZ(calc(clamp(80px, 18vw, 110px) / 2)); }
        .face-right  { transform: rotateY( 90deg) translateZ(calc(clamp(80px, 18vw, 110px) / 2)); }
        .face-left   { transform: rotateY(-90deg) translateZ(calc(clamp(80px, 18vw, 110px) / 2)); }
        .face-top    { transform: rotateX( 90deg) translateZ(calc(clamp(80px, 18vw, 110px) / 2)); background: rgba(170, 80, 250, 0.8); }
        .face-bottom { transform: rotateX(-90deg) translateZ(calc(clamp(80px, 18vw, 110px) / 2)); }

        /* Options Grid */
        .options-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 12px;
        }

        @media (max-width: 400px) {
            .options-grid {
                grid-template-columns: 1fr;
            }
        }

        .btn {
            background: #f8f9fa;
            border: 2px solid #e0e0e0;
            padding: clamp(10px, 3vw, 15px);
            font-size: clamp(0.95rem, 3.5vw, 1.1rem);
            font-weight: 500;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            outline: none;
            width: 100%;
        }

        .btn:hover {
            background: #eef2f7;
            border-color: var(--secondary);
            transform: translateY(-2px);
        }

        .btn.correct {
            background: var(--success) !important;
            color: white;
            border-color: var(--success);
        }

        .btn.wrong {
            background: var(--danger) !important;
            color: white;
            border-color: var(--danger);
        }

        .audio-btn {
            background: none;
            border: none;
            font-size: clamp(1.2rem, 4vw, 1.5rem);
            cursor: pointer;
            padding: 5px;
            display: inline-flex;
            align-items: center;
        }

        .screen {
            display: none;
        }

        .screen.active {
            display: block;
        }

        #start-screen h1, #win-screen h2 {
            font-size: clamp(1.6rem, 6vw, 2.2rem);
            color: var(--primary);
            margin-bottom: 10px;
        }
        
        #start-screen p, #win-screen p {
            font-size: clamp(0.95rem, 3.5vw, 1.1rem);
            color: #666;
            margin-bottom: 25px;
            line-height: 1.4;
        }

        .button-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            align-items: center;
        }

        .start-btn {
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            color: white;
            padding: 12px 35px;
            font-size: clamp(1.1rem, 4vw, 1.3rem);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(142, 45, 226, 0.4);
            width: 100%;
            max-width: 280px;
        }

        .start-btn.space {
            background: linear-gradient(90deg, #1e3a8a, #3b82f6);
            box-shadow: 0 5px 15px rgba(59, 130, 246, 0.4);
        }
    </style>
</head>
<body>

    <div class="game-container">
        <div id="start-screen" class="screen active">
            <h1>Shapes & Planets!</h1>
            <p>Master 50 Levels with interactive voice commentary. Choose your challenge mode below!</p>
            <div class="button-group">
                <button class="start-btn" onclick="startGame('shapes')">Geometry Mode 🔺</button>
                <button class="start-btn space" onclick="startGame('planets')">Planet Mode 🚀</button>
            </div>
        </div>

        <div id="game-screen" class="screen">
            <div class="header">
                <span class="level-badge" id="level-display">Level 1/50</span>
                <span class="score-badge" id="score-display">Score: 0</span>
            </div>
            
            <div class="progress-bar">
                <div class="progress" id="progress-juice"></div>
            </div>

            <div class="question">
                <span id="question-text">What shape is this?</span>
                <button class="audio-btn" onclick="repeatQuestion()" aria-label="Repeat Audio">🔊</button>
            </div>

            <div class="display-area" id="shape-viewport">
                </div>

            <div class="options-grid" id="options-container">
                </div>
        </div>

        <div id="win-screen" class="screen">
            <h2>🎉 Congratulations! 🎉</h2>
            <p id="win-message">You have conquered all 50 levels!</p>
            <p id="final-score" style="font-weight: bold; color: var(--success); margin-bottom: 20px;"></p>
            <button class="start-btn" onclick="showScreen('start-screen')">Main Menu</button>
        </div>
    </div>

    <script>
        const shapes2D = [
            { name: 'Circle', type: '2D', html: `<svg viewBox="0 0 120 120"><circle cx="60" cy="60" r="50" fill="#36d1dc" stroke="#fff" stroke-width="3"/></svg>` },
            { name: 'Square', type: '2D', html: `<svg viewBox="0 0 120 120"><rect x="10" y="10" width="100" height="100" fill="#ff7675" stroke="#fff" stroke-width="3"/></svg>` },
            { name: 'Triangle', type: '2D', html: `<svg viewBox="0 0 120 120"><polygon points="60,10 110,110 10,110" fill="#00cec9" stroke="#fff" stroke-width="3"/></svg>` },
            { name: 'Rectangle', type: '2D', html: `<svg viewBox="0 0 140 120"><rect x="10" y="25" width="120" height="70" fill="#6c5ce7" stroke="#fff" stroke-width="3"/></svg>` },
            { name: 'Pentagon', type: '2D', html: `<svg viewBox="0 0 120 120"><polygon points="60,10 110,45 90,110 30,110 10,45" fill="#fdcb6e" stroke="#fff" stroke-width="3"/></svg>` },
            { name: 'Hexagon', type: '2D', html: `<svg viewBox="0 0 120 120"><polygon points="60,10 110,35 110,85 60,110 10,85 10,35" fill="#e84393" stroke="#fff" stroke-width="3"/></svg>` },
            { name: 'Oval', type: '2D', html: `<svg viewBox="0 0 140 120"><ellipse cx="70" cy="60" rx="60" ry="40" fill="#00b894" stroke="#fff" stroke-width="3"/></svg>` },
            { name: 'Star', type: '2D', html: `<svg viewBox="0 0 120 120"><polygon points="60,5 75,45 115,45 83,70 95,110 60,85 25,110 37,70 5,45 45,45" fill="#f1c40f" stroke="#fff" stroke-width="3"/></svg>` }
        ];

        const shapes3D = [
            { name: 'Cube', type: '3D', html: `<div class="scene3d"><div class="cube"><div class="cube-face face-front"></div><div class="cube-face face-back"></div><div class="cube-face face-right"></div><div class="cube-face face-left"></div><div class="cube-face face-top"></div><div class="cube-face face-bottom"></div></div></div>` },
            { name: 'Sphere', type: '3D', html: `<svg viewBox="0 0 120 120"><defs><radialGradient id="sphereGrad" cx="30%" cy="30%" r="70%"><stop offset="0%" stop-color="#a29bfe"/><stop offset="100%" stop-color="#6c5ce7"/></radialGradient></defs><circle cx="60" cy="60" r="50" fill="url(#sphereGrad)"/></svg>` },
            { name: 'Cylinder', type: '3D', html: `<svg viewBox="0 0 120 140"><ellipse cx="60" cy="25" rx="35" ry="12" fill="#ffeaa7" stroke="#d63031" stroke-width="2"/><path d="M25,25 L25,105 A35,12 0 0,0 95,105 L95,25" fill="#fab1a0" stroke="#d63031" stroke-width="2"/><ellipse cx="60" cy="105" rx="35" ry="12" fill="#fab1a0" stroke="#d63031" stroke-width="2"/></svg>` },
            { name: 'Cone', type: '3D', html: `<svg viewBox="0 0 120 140"><path d="M60,15 L25,105 A35,12 0 0,0 95,105 Z" fill="#95afc0" stroke="#535c68" stroke-width="2"/><ellipse cx="60" cy="105" rx="35" ry="12" fill="#c7ecee" stroke="#535c68" stroke-width="2"/></svg>` }
        ];

        // NEW: Photorealistic planet vector renderings using layered shading models
        const planetsPool = [
            { name: 'Mars', type: 'Planet', html: `
                <svg viewBox="0 0 120 120">
                    <defs>
                        <radialGradient id="marsBase" cx="30%" cy="30%" r="70%">
                            <stop offset="0%" stop-color="#f87171"/>
                            <stop offset="45%" stop-color="#e11d48"/>
                            <stop offset="85%" stop-color="#9f1239"/>
                            <stop offset="100%" stop-color="#4c0519"/>
                        </radialGradient>
                        <radialGradient id="shadow" cx="50%" cy="50%" r="50%">
                            <stop offset="75%" stop-color="#000" stop-opacity="0"/>
                            <stop offset="100%" stop-color="#000" stop-opacity="0.8"/>
                        </radialGradient>
                    </defs>
                    <circle cx="60" cy="60" r="48" fill="url(#marsBase)"/>
                    <path d="M35,30 Q45,20 65,35 T90,30 T50,55 Z" fill="#881337" opacity="0.4"/>
                    <path d="M25,75 Q50,60 70,80 T100,65 Q80,95 45,90 Z" fill="#4c0519" opacity="0.3"/>
                    <circle cx="58" cy="14" rx="10" ry="3" fill="#fee2e2" opacity="0.6" transform="rotate(-10 58 14)"/> <circle cx="60" cy="60" r="48" fill="url(#shadow)"/>
                </svg>` 
            },
            { name: 'Earth', type: 'Planet', html: `
                <svg viewBox="0 0 120 120">
                    <defs>
                        <radialGradient id="oceanGrad" cx="35%" cy="35%" r="65%">
                            <stop offset="0%" stop-color="#38bdf8"/>
                            <stop offset="30%" stop-color="#1d4ed8"/>
                            <stop offset="85%" stop-color="#1e3a8a"/>
                            <stop offset="100%" stop-color="#0f172a"/>
                        </radialGradient>
                        <radialGradient id="atmosphere" cx="50%" cy="50%" r="50%">
                            <stop offset="90%" stop-color="#06b6d4" stop-opacity="0"/>
                            <stop offset="98%" stop-color="#06b6d4" stop-opacity="0.5"/>
                            <stop offset="100%" stop-color="#38bdf8" stop-opacity="1"/>
                        </radialGradient>
                    </defs>
                    <circle cx="60" cy="60" r="48" fill="url(#oceanGrad)"/>
                    <path d="M40,25 Q42,15 65,22 Q75,30 70,45 Q55,60 45,50 Z M25,65 Q35,55 55,70 Q75,60 85,75 Q70,95 40,90 Q20,85 25,65 Z" fill="#15803d" opacity="0.85"/>
                    <path d="M42,28 Q48,22 58,30 M30,70 Q45,65 55,75" fill="#166534" opacity="0.9"/> <path d="M20,40 Q40,30 65,45 T100,35 Q80,55 50,48 T20,40 Z M35,75 Q60,65 85,80 Q65,90 40,85 Z" fill="#ffffff" opacity="0.45"/>
                    <circle cx="60" cy="60" r="48" fill="url(#shadow)"/>
                    <circle cx="60" cy="60" r="49" fill="url(#atmosphere)" pointer-events="none"/>
                </svg>` 
            },
            { name: 'Saturn', type: 'Planet', html: `
                <svg viewBox="0 0 160 120">
                    <defs>
                        <radialGradient id="saturnGrad" cx="40%" cy="35%" r="60%">
                            <stop offset="0%" stop-color="#fef08a"/>
                            <stop offset="60%" stop-color="#eab308"/>
                            <stop offset="85%" stop-color="#a16207"/>
                            <stop offset="100%" stop-color="#451a03"/>
                        </radialGradient>
                    </defs>
                    <g transform="rotate(-12 80 60)">
                        <ellipse cx="80" cy="60" rx="72" ry="18" fill="none" stroke="#a16207" stroke-width="8" opacity="0.3"/>
                        <ellipse cx="80" cy="60" rx="66" ry="15" fill="none" stroke="#ca8a04" stroke-width="6" opacity="0.6"/>
                        <ellipse cx="80" cy="60" rx="58" ry="11" fill="none" stroke="#fef08a" stroke-width="4" opacity="0.5"/>
                    </g>
                    <circle cx="80" cy="60" r="38" fill="url(#saturnGrad)"/>
                    <path d="M43,52 Q80,58 117,52 L116,56 Q80,62 44,56 Z" fill="#ca8a04" opacity="0.4"/>
                    <path d="M46,42 Q80,47 114,42 L113,45 Q80,50 47,45 Z" fill="#854d0e" opacity="0.3"/>
                    <circle cx="80" cy="60" r="38" fill="url(#shadow)"/>
                    <g transform="rotate(-12 80 60)">
                        <path d="M8,60 A72,18 0 0,0 152,60" fill="none" stroke="#a16207" stroke-width="8" opacity="0.4"/>
                        <path d="M14,60 A66,15 0 0,0 146,60" fill="none" stroke="#ca8a04" stroke-width="6" opacity="0.8"/>
                        <path d="M22,60 A58,11 0 0,0 138,60" fill="none" stroke="#fef08a" stroke-width="4" opacity="0.7"/>
                    </g>
                </svg>` 
            },
            { name: 'Neptune', type: 'Planet', html: `
                <svg viewBox="0 0 120 120">
                    <defs>
                        <radialGradient id="nepGrad" cx="30%" cy="30%" r="70%">
                            <stop offset="0%" stop-color="#60a5fa"/>
                            <stop offset="40%" stop-color="#2563eb"/>
                            <stop offset="80%" stop-color="#1d4ed8"/>
                            <stop offset="100%" stop-color="#031b4e"/>
                        </radialGradient>
                    </defs>
                    <circle cx="60" cy="60" r="48" fill="url(#nepGrad)"/>
                    <ellipse cx="45" cy="55" rx="14" ry="6" fill="#1e3a8a" opacity="0.5" transform="rotate(-10 45 55)"/> <path d="M20,35 Q50,42 100,30" fill="none" stroke="#93c5fd" stroke-width="1.5" opacity="0.4"/>
                    <path d="M15,75 Q60,65 105,72" fill="none" stroke="#2563eb" stroke-width="2" opacity="0.6"/>
                    <path d="M45,70 Q55,68 65,72" fill="none" stroke="#fff" stroke-width="1" opacity="0.5"/> <circle cx="60" cy="60" r="48" fill="url(#shadow)"/>
                </svg>` 
            },
            { name: 'Jupiter', type: 'Planet', html: `
                <svg viewBox="0 0 120 120">
                    <defs>
                        <radialGradient id="jupGrad" cx="35%" cy="30%" r="65%">
                            <stop offset="0%" stop-color="#ffedd5"/>
                            <stop offset="25%" stop-color="#fed7aa"/>
                            <stop offset="55%" stop-color="#ea580c"/>
                            <stop offset="85%" stop-color="#9a3412"/>
                            <stop offset="100%" stop-color="#431407"/>
                        </radialGradient>
                    </defs>
                    <circle cx="60" cy="60" r="48" fill="url(#jupGrad)"/>
                    <path d="M13,42 Q60,48 107,42 L109,47 Q60,53 11,47 Z" fill="#ffedd5" opacity="0.25"/>
                    <path d="M11,54 Q60,60 109,54 L111,61 Q60,67 9,61 Z" fill="#7c2d12" opacity="0.4"/>
                    <path d="M12,68 Q60,72 108,68 L106,73 Q60,77 14,73 Z" fill="#fdba74" opacity="0.3"/>
                    <ellipse cx="78" cy="72" rx="10" ry="6" fill="#991b1b" opacity="0.85"/>
                    <ellipse cx="78" cy="71" rx="7" ry="3" fill="#ea580c" opacity="0.6"/>
                    <circle cx="60" cy="60" r="48" fill="url(#shadow)"/>
                </svg>` 
            }
        ];

        const allShapes = [...shapes2D, ...shapes3D];

        let currentLevel = 1;
        let score = 0;
        let currentItem = null;
        let isProcessing = false;
        let gameMode = 'shapes';

        const synth = window.speechSynthesis;

        function speak(text) {
            if (synth.speaking) synth.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.rate = 1.0;
            utterance.pitch = 1.1;
            synth.speak(utterance);
        }

        function showScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
        }

        function startGame(mode) {
            gameMode = mode;
            currentLevel = 1;
            score = 0;
            
            const viewport = document.getElementById('shape-viewport');
            if (gameMode === 'planets') {
                viewport.classList.add('space-mode');
            } else {
                viewport.classList.remove('space-mode');
            }

            showScreen('game-screen');
            loadLevel();
        }

        function loadLevel() {
            isProcessing = false;
            document.getElementById('level-display').innerText = `Level ${currentLevel}/50`;
            document.getElementById('score-display').innerText = `Score: ${score}`;
            document.getElementById('progress-juice').style.width = `${(currentLevel / 50) * 100}%`;

            let questionText = "";
            let pool = gameMode === 'shapes' ? [...allShapes] : [...planetsPool];
            currentItem = pool[Math.floor(Math.random() * pool.length)];

            if (gameMode === 'shapes') {
                let questionType = currentLevel % 3; 
                if (questionType === 1) {
                    questionText = `Identify the shape shown in the picture.`;
                } else if (questionType === 2) {
                    questionText = `Is this a 2D shape or a 3D shape?`;
                } else {
                    questionText = `Find the ${currentItem.name}.`;
                }
                generateOptions(questionType);
            } else {
                questionText = `Which cosmic planet is this?`;
                generatePlanetOptions();
            }

            document.getElementById('question-text').innerText = questionText;
            document.getElementById('shape-viewport').innerHTML = `<div class="shape">${currentItem.html}</div>`;

            speak(questionText);
        }

        function generateOptions(type) {
            const container = document.getElementById('options-container');
            container.innerHTML = '';
            let options = [];

            if (type === 2) {
                options = ['2D', '3D'];
            } else {
                options.push(currentItem.name);
                while (options.length < 4) {
                    let randomShape = allShapes[Math.floor(Math.random() * allShapes.length)].name;
                    if (!options.includes(randomShape)) {
                        options.push(randomShape);
                    }
                }
                options.sort(() => Math.random() - 0.5);
            }

            renderButtons(options, type);
        }

        function generatePlanetOptions() {
            const container = document.getElementById('options-container');
            container.innerHTML = '';
            let options = [currentItem.name];

            while (options.length < 2) {
                let randomPlanet = planetsPool[Math.floor(Math.random() * planetsPool.length)].name;
                if (!options.includes(randomPlanet)) {
                    options.push(randomPlanet);
                }
            }
            options.sort(() => Math.random() - 0.5);
            renderButtons(options, 0);
        }

        function renderButtons(options, type) {
            const container = document.getElementById('options-container');
            options.forEach(opt => {
                const button = document.createElement('button');
                button.className = 'btn';
                button.innerText = opt;
                button.onclick = () => handleAnswer(opt, button, type);
                container.appendChild(button);
            });
        }

        function handleAnswer(selected, button, type) {
            if (isProcessing) return;
            isProcessing = true;

            let isCorrect = false;
            if (gameMode === 'shapes' && type === 2) {
                isCorrect = (selected === currentItem.type);
            } else {
                isCorrect = (selected === currentItem.name);
            }

            if (isCorrect) {
                button.classList.add('correct');
                score += 10;
                speak("Correct! Outstanding job.");
                
                setTimeout(() => {
                    if (currentLevel < 50) {
                        currentLevel++;
                        loadLevel();
                    } else {
                        endGame();
                    }
                }, 1500);
            } else {
                button.classList.add('wrong');
                speak("Try again!");
                
                setTimeout(() => {
                    isProcessing = false;
                    button.classList.remove('wrong');
                }, 1200);
            }
        }

        function repeatQuestion() {
            const questionText = document.getElementById('question-text').innerText;
            speak(questionText);
        }

        function endGame() {
            showScreen('win-screen');
            const msg = gameMode === 'shapes' ? "You became a true Shapes Master!" : "You conquered the entire Solar System!";
            document.getElementById('win-message').innerText = msg;
            document.getElementById('final-score').innerText = `Your Final Score: ${score} points`;
            speak(`Congratulations! ${msg}`);
        }
    </script>
