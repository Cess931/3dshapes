<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shapes, Planets, Colors, Animals & Fruits Challenge</title>
    <style>
        :root {
            --primary: #4a00e0;
            --secondary: #8e2de2;
            --success: #00b09b;
            --danger: #ff416c;
            --space-bg: #050510;
            --color-bg: #f8fafc;
            --animal-bg: #fef3c7;
            --fruit-bg: #ecfdf5;
            --bg: #f0f2f5;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px;
            color: #333;
            transition: background 1s ease, color 1s ease;
        }

        body.morning {
            background: radial-gradient(circle at top left, #fff6b5 0%, #fbbf24 40%, #fb7185 100%);
            color: #2a1a05;
            animation: sunPulse 12s ease-in-out infinite alternate;
        }

        body.morning::before {
            content: '';
            position: fixed;
            top: 20px;
            right: 20px;
            width: 160px;
            height: 160px;
            border-radius: 50%;
            background: radial-gradient(circle, #fff9c4 0%, #f59e0b 50%, rgba(251, 145, 32, 0.8) 100%);
            box-shadow: 0 0 60px rgba(251, 145, 32, 0.5);
            z-index: 0;
            pointer-events: none;
        }

        body.afternoon {
            background: linear-gradient(135deg, #bfdbfe, #38bdf8);
            color: #0f172a;
            animation: calmBreeze 16s ease-in-out infinite alternate;
        }

        body.afternoon::before {
            content: '';
            position: fixed;
            top: 25px;
            right: 25px;
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: radial-gradient(circle, #ffffff 0%, #fef9c3 50%, rgba(245, 158, 11, 0.8) 100%);
            box-shadow: 0 0 25px rgba(255,255,255,0.6);
            z-index: 0;
            pointer-events: none;
        }

        body.afternoon::after {
            content: '';
            position: fixed;
            top: 80px;
            right: 40px;
            width: 160px;
            height: 80px;
            background: radial-gradient(circle at 35% 35%, #ffffff 38%, transparent 40%),
                        radial-gradient(circle at 65% 40%, #ffffff 32%, transparent 35%),
                        radial-gradient(circle at 50% 60%, #ffffff 30%, transparent 33%);
            border-radius: 48% 52% 55% 45% / 45% 45% 55% 55%;
            opacity: 0.9;
            z-index: 0;
            pointer-events: none;
        }

        body.night {
            background: radial-gradient(circle at top, #182133 0%, #020617 40%, #020816 100%);
            color: #e2e8f0;
            animation: nightGlow 18s ease-in-out infinite alternate;
        }

        body.night::before {
            content: '';
            position: fixed;
            inset: 0;
            pointer-events: none;
            background-image:
                radial-gradient(circle, rgba(255,255,255,0.95) 1px, transparent 1px),
                radial-gradient(circle, rgba(255,255,255,0.65) 1px, transparent 1px);
            background-size: 40px 40px, 80px 80px;
            opacity: 0.28;
            mix-blend-mode: screen;
            animation: starTwinkle 6s linear infinite;
        }

        body.night::after {
            content: '';
            position: fixed;
            top: 30px;
            right: 40px;
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: radial-gradient(circle at 40% 40%, #f8fafc 0%, #a5b4fc 45%, #2d3748 100%);
            box-shadow: 0 0 40px rgba(248,250,252,0.2);
            z-index: 0;
            pointer-events: none;
        }

        .game-container {
            background: white;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 500px;
            text-align: center;
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .level-badge {
            background: var(--secondary);
            color: white;
            padding: 6px 14px;
            border-radius: 50px;
            font-weight: bold;
            font-size: clamp(0.9rem, 3vw, 1.1rem);
        }

        .score-badge {
            font-weight: bold;
            color: #666;
            font-size: clamp(0.9rem, 3vw, 1.1rem);
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #eee;
            border-radius: 5px;
            overflow: hidden;
            margin-bottom: 20px;
        }

        .progress {
            height: 100%;
            background: linear-gradient(90deg, var(--success), #96c93d);
            width: 2%;
            transition: width 0.3s ease;
        }

        .question {
            font-size: clamp(1.1rem, 4vw, 1.4rem);
            font-weight: 600;
            margin-bottom: 20px;
            color: #222;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .display-area {
            height: clamp(160px, 28vh, 240px);
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
            background: #fafafa;
            border-radius: 15px;
            border: 2px dashed #ddd;
            position: relative;
            overflow: hidden;
            transition: background 0.4s ease;
        }

        .display-area.space-mode {
            background: var(--space-bg);
            background-image: 
                radial-gradient(white, rgba(255,255,255,.2) 2px, transparent 40px),
                radial-gradient(white, rgba(255,255,255,.15) 1px, transparent 30px);
            background-size: 120px 120px, 90px 90px;
            background-position: 0 0, 40px 60px;
            border-color: #1e293b;
        }

        .display-area.color-mode { background: var(--color-bg); border-color: #cbd5e1; }
        .display-area.animal-mode { background: var(--animal-bg); border-color: #fde68a; }
        .display-area.fruit-mode { background: var(--fruit-bg); border-color: #a7f3d0; }

        @keyframes sunPulse {
            0% { background-position: 0% 0%; }
            100% { background-position: 100% 100%; }
        }

        @keyframes calmBreeze {
            0% { background-position: 0% 0%; }
            100% { background-position: 100% 100%; }
        }

        @keyframes nightGlow {
            0% { opacity: 0.9; }
            50% { opacity: 1; }
            100% { opacity: 0.95; }
        }

        @keyframes starTwinkle {
            0%, 100% { opacity: 0.22; transform: translateY(0); }
            50% { opacity: 0.34; transform: translateY(-2px); }
        }

        .shape {
            transition: transform 0.3s ease;
            max-width: 100%;
            max-height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .shape svg {
            width: clamp(110px, 24vw, 150px);
            height: clamp(110px, 24vw, 150px);
        }

        .scene3d {
            width: clamp(80px, 18vw, 110px);
            height: clamp(80px, 18vw, 110px);
            transform-style: preserve-3d;
            animation: spin 8s infinite linear;
        }

        @keyframes spin {
            0% { transform: rotateX(-20deg) rotateY(0deg); }
            100% { transform: rotateX(-20deg) rotateY(360deg); }
        }

        .cube {
            position: relative;
            width: 100%;
            height: 100%;
            transform-style: preserve-3d;
        }
        
        .cube-face {
            position: absolute;
            width: 100%;
            height: 100%;
            background: rgba(142, 45, 226, 0.7);
            border: 2px solid #fff;
        }
        
        .face-front  { transform: rotateY(  0deg) translateZ(calc(clamp(80px, 18vw, 110px) / 2)); }
        .face-back   { transform: rotateY(180deg) translateZ(calc(clamp(80px, 18vw, 110px) / 2)); }
        .face-right  { transform: rotateY( 90deg) translateZ(calc(clamp(80px, 18vw, 110px) / 2)); }
        .face-left   { transform: rotateY(-90deg) translateZ(calc(clamp(80px, 18vw, 110px) / 2)); }
        .face-top    { transform: rotateX( 90deg) translateZ(calc(clamp(80px, 18vw, 110px) / 2)); background: rgba(170, 80, 250, 0.8); }
        .face-bottom { transform: rotateX(-90deg) translateZ(calc(clamp(80px, 18vw, 110px) / 2)); }

        .options-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 12px;
        }

        @media (max-width: 400px) {
            .options-grid { grid-template-columns: 1fr; }
        }

        .btn {
            background: #f8f9fa;
            border: 2px solid #e0e0e0;
            padding: clamp(10px, 3vw, 15px);
            font-size: clamp(0.95rem, 3.5vw, 1.1rem);
            font-weight: 500;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            outline: none;
            width: 100%;
        }

        .btn:hover {
            background: #eef2f7;
            border-color: var(--secondary);
            transform: translateY(-2px);
        }

        .btn.correct { background: var(--success) !important; color: white; border-color: var(--success); }
        .btn.wrong { background: var(--danger) !important; color: white; border-color: var(--danger); }

        .audio-btn {
            background: none;
            border: none;
            font-size: clamp(1.2rem, 4vw, 1.5rem);
            cursor: pointer;
            padding: 5px;
            display: inline-flex;
            align-items: center;
        }

        .screen { display: none; }
        .screen.active { display: block; }

        #start-screen h1, #win-screen h2 {
            font-size: clamp(1.6rem, 6vw, 2.2rem);
            color: var(--primary);
            margin-bottom: 10px;
        }
        
        #start-screen p, #win-screen p {
            font-size: clamp(0.95rem, 3.5vw, 1.1rem);
            color: #666;
            margin-bottom: 25px;
            line-height: 1.4;
        }

        .button-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            align-items: center;
            width: 100%;
        }

        .start-btn {
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            color: white;
            padding: 12px 35px;
            font-size: clamp(1.1rem, 4vw, 1.3rem);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(142, 45, 226, 0.4);
            width: 100%;
            max-width: 280px;
            transition: transform 0.2s;
        }
        .start-btn:hover { transform: translateY(-2px); }

        .start-btn.space { background: linear-gradient(90deg, #1e3a8a, #3b82f6); box-shadow: 0 5px 15px rgba(59, 130, 246, 0.4); }
        .start-btn.colors { background: linear-gradient(90deg, #ec4899, #f43f5e); box-shadow: 0 5px 15px rgba(244, 63, 94, 0.4); }
        .start-btn.animals { background: linear-gradient(90deg, #d97706, #f59e0b); box-shadow: 0 5px 15px rgba(245, 158, 11, 0.4); }
        .start-btn.fruits { background: linear-gradient(90deg, #10b981, #10b981); box-shadow: 0 5px 15px rgba(16, 185, 129, 0.4); }
    </style>
</head>
<body>

    <div class="game-container">
        <div id="start-screen" class="screen active">
            <h1>Kids Challenge!</h1>
            <p>Master 50 Levels with interactive voice commentary. Choose your challenge mode below!</p>
            <div class="button-group">
                <button class="start-btn" onclick="startGame('shapes')">Geometry Mode 🔺</button>
                <button class="start-btn space" onclick="startGame('planets')">Planet Mode 🚀</button>
                <button class="start-btn colors" onclick="startGame('colors')">Color Mode 🎨</button>
                <button class="start-btn animals" onclick="startGame('animals')">Animal Mode 🦁</button>
                <button class="start-btn fruits" onclick="startGame('fruits')">Fruit Mode 🍉</button>
            </div>
        </div>

        <div id="game-screen" class="screen">
            <div class="header">
                <span class="level-badge" id="level-display">Level 1/50</span>
                <span class="score-badge" id="score-display">Score: 0</span>
            </div>
            
            <div class="progress-bar">
                <div class="progress" id="progress-juice"></div>
            </div>

            <div class="question">
                <span id="question-text">What shape is this?</span>
                <button class="audio-btn" onclick="repeatQuestion()" aria-label="Repeat Audio">🔊</button>
            </div>

            <div class="display-area" id="shape-viewport"></div>

            <div class="options-grid" id="options-container"></div>
        </div>

        <div id="win-screen" class="screen">
            <h2>🎉 Congratulations! 🎉</h2>
            <p id="win-message">You have conquered all 50 levels!</p>
            <p id="final-score" style="font-weight: bold; color: var(--success); margin-bottom: 20px;"></p>
            <button class="start-btn" onclick="showScreen('start-screen')">Main Menu</button>
        </div>
    </div>

        let currentLevel = 1;
        let score = 0;
        let currentItem = null;
        let isProcessing = false;
        let gameMode = 'shapes';

        const synth = window.speechSynthesis;

        function speak(text) {
            if (synth.speaking) synth.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.rate = 1.0;
            utterance.pitch = 1.1;
            synth.speak(utterance);
        }

        function showScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
        }

        function setTimeTheme() {
            const hour = new Date().getHours();
            const body = document.body;
            body.classList.remove('morning', 'afternoon', 'night');
            if (hour >= 5 && hour < 12) {
                body.classList.add('morning');
            } else if (hour >= 12 && hour < 18) {
                body.classList.add('afternoon');
            } else {
                body.classList.add('night');
            }
        }

        document.addEventListener('DOMContentLoaded', setTimeTheme);
        setTimeTheme();

        function startGame(mode) {
            gameMode = mode;
            currentLevel = 1;
            score = 0;
            
            const viewport = document.getElementById('shape-viewport');
            viewport.className = 'display-area'; 
            
            if (gameMode === 'planets') viewport.classList.add('space-mode');
            else if (gameMode === 'colors') viewport.classList.add('color-mode');
            else if (gameMode === 'animals') viewport.classList.add('animal-mode');
            else if (gameMode === 'fruits') viewport.classList.add('fruit-mode');

            showScreen('game-screen');
            loadLevel();
        }

        function loadLevel() {
            isProcessing = false;
            document.getElementById('level-display').innerText = `Level ${currentLevel}/50`;
            document.getElementById('score-display').innerText = `Score: ${score}`;
            document.getElementById('progress-juice').style.width = `${(currentLevel / 50) * 100}%`;

            let questionText = "";
            let pool = [];

            if (gameMode === 'shapes') {
                pool = [...shapes2D, ...shapes3D];
                currentItem = pool[Math.floor(Math.random() * pool.length)];
                let isTypeQuestion = currentLevel % 2 === 0;
                questionText = isTypeQuestion ? `Is this a 2D or 3D shape?` : `Identify the shape shown in the picture.`;
                generateGenericOptions(pool, 4);
            } else if (gameMode === 'planets') {
                pool = [...planetsPool];
                currentItem = pool[Math.floor(Math.random() * pool.length)];
                questionText = `Which cosmic planet is this?`;
                generateGenericOptions(pool, 2);
            } else if (gameMode === 'colors') {
                pool = [...colorsPool];
                currentItem = pool[Math.floor(Math.random() * pool.length)];
                questionText = `What beautiful color is this?`;
                generateGenericOptions(pool, 4);
            } else if (gameMode === 'animals') {
                pool = [...animalsPool];
                currentItem = pool[Math.floor(Math.random() * pool.length)];
                questionText = `What is the name of this animal?`;
                generateGenericOptions(pool, 3);
            } else if (gameMode === 'fruits') {
                pool = [...fruitsPool];
                currentItem = pool[Math.floor(Math.random() * pool.length)];
                questionText = `Can you identify this tasty fruit?`;
                generateGenericOptions(pool, 3);
            }

            document.getElementById('question-text').innerText = questionText;
            document.getElementById('shape-viewport').innerHTML = `<div class="shape">${currentItem.html}</div>`;
            speak(questionText);
        }

        function generateGenericOptions(pool, count) {
            const container = document.getElementById('options-container');
            container.innerHTML = '';
            
            if (gameMode === 'shapes' && currentLevel % 2 === 0) {
                renderButtons(['2D', '3D']);
                return;
            }

            let options = [currentItem.name];
            let maxOptions = Math.min(count, pool.length);
            while (options.length < maxOptions) {
                let randomItem = pool[Math.floor(Math.random() * pool.length)].name;
                if (!options.includes(randomItem)) {
                    options.push(randomItem);
                }
            }
            options.sort(() => Math.random() - 0.5);
            renderButtons(options);
        }

        function renderButtons(options) {
            const container = document.getElementById('options-container');
            options.forEach(opt => {
                const button = document.createElement('button');
                button.className = 'btn';
                button.innerText = opt;
                button.onclick = () => handleAnswer(opt, button);
                container.appendChild(button);
            });
        }

        function handleAnswer(selected, button) {
            if (isProcessing) return;
            isProcessing = true;

            let correctName = currentItem.name;
            if (gameMode === 'shapes' && currentLevel % 2 === 0) {
                correctName = shapes2D.some(s => s.name === currentItem.name) ? '2D' : '3D';
            }

            const isCorrect = (selected === correctName);

            if (isCorrect) {
                button.classList.add('correct');
                score += 10;
                speak("Correct! Outstanding job.");
            } else {
                button.classList.add('wrong');
                speak("Oh! Let's try a different one.");
                
                // Highlight the true correct answer button for clarity
                const buttons = document.querySelectorAll('.options-grid .btn');
                buttons.forEach(btn => {
                    if (btn.innerText === correctName) {
                        btn.classList.add('correct');
                    }
                });
            }

            // Always load a brand new question layout after a brief visibility delay
            setTimeout(() => {
                if (currentLevel < 50) {
                    currentLevel++;
                    loadLevel();
                } else {
                    endGame();
                }
            }, 1500);
        }

        function repeatQuestion() {
            const questionText = document.getElementById('question-text').innerText;
            speak(questionText);
        }

        function endGame() {
            showScreen('win-screen');
            let msg = `You completed the ${gameMode.toUpperCase()} challenge loop successfully!`;
            document.getElementById('win-message').innerText = msg;
            document.getElementById('final-score').innerText = `Your Final Score: ${score} points`;
            speak("Congratulations! Excellent work.");
        }
    </script>
</body>
</html>
